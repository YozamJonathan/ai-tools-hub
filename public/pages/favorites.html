<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Favorites — AI Tools Hub</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<nav class="navbar">
  <div class="navbar-inner">
    <a href="../index.html" class="nav-logo"><div class="nav-logo-dot"></div>AI Tools Hub</a>
    <div class="nav-links">
      <a href="../index.html" class="nav-link">Tools</a>
      <a href="library.html"  class="nav-link">Library <span class="pro-badge">Pro</span></a>
      <a href="favorites.html" class="nav-link active">Saved</a>
      <a href="suggest.html"   class="nav-link">Suggest</a>
    </div>
    <div id="auth-buttons" style="display:flex;align-items:center;gap:8px">
      <button class="nav-btn nav-btn-ghost" onclick="openModal('login')">Sign in</button>
      <button class="nav-btn nav-btn-primary" onclick="openModal('register')">Join free</button>
    </div>
    <div id="user-menu" style="display:none;align-items:center;gap:8px">
      <span style="font-size:14px;color:var(--text2)">Hi, <strong id="user-name" style="color:var(--text)"></strong></span>
      <button class="nav-btn nav-btn-ghost" onclick="handleLogout()">Logout</button>
    </div>
  </div>
</nav>

<main class="main-content">
  <div class="main-inner">
    <!-- Logged out state -->
    <div id="favorites-locked" style="text-align:center;padding:80px 24px">
      <div style="font-size:56px;margin-bottom:20px">♡</div>
      <h2 style="font-size:28px;font-weight:800;margin-bottom:12px">Save your favorite AI tools</h2>
      <p style="font-size:16px;color:var(--text2);max-width:400px;margin:0 auto 28px">Sign in to build your personal collection. Add tools to named lists and access them from any device.</p>
      <div style="display:flex;align-items:center;justify-content:center;gap:12px">
        <button class="btn btn-primary btn-lg" onclick="openModal('register')">Join free →</button>
        <button class="btn btn-outline" onclick="openModal('login')">Sign in</button>
      </div>
    </div>

    <!-- Logged in state (demo) -->
    <div id="favorites-content" style="display:none">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:28px">
        <div>
          <h2 style="font-size:24px;font-weight:800;margin-bottom:4px">My Collections</h2>
          <p style="color:var(--text2);font-size:14px">2 collections · 5 tools saved</p>
        </div>
        <button class="btn btn-outline" onclick="showToast('Create collection — coming soon','info')">+ New collection</button>
      </div>

      <!-- Collection -->
      <div style="margin-bottom:36px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
          <div style="font-family:var(--font-display);font-size:18px;font-weight:700">My Favourites <span style="font-size:14px;color:var(--text3);font-weight:400">(3 tools)</span></div>
          <button class="btn btn-ghost btn-sm" style="color:var(--text3)">Share ↗</button>
        </div>
        <div class="tools-grid card-stagger" id="saved-grid"></div>
      </div>
    </div>
  </div>
</main>

<div class="toast-container" id="toast-container"></div>

<!-- Modals -->
<div class="modal-overlay" id="modal-login">
  <div class="modal">
    <div class="modal-header"><div class="modal-title">Sign in</div></div>
    <form onsubmit="handleLogin(event)">
      <div class="form-group"><label class="form-label">Email</label><input type="email" id="login-email" class="form-input" placeholder="you@example.com"></div>
      <div class="form-group"><label class="form-label">Password</label><input type="password" id="login-pass" class="form-input" placeholder="••••••••"></div>
      <button type="submit" class="btn btn-primary btn-full" style="margin-top:8px">Sign in</button>
    </form>
    <button onclick="closeModal('login')" style="position:absolute;top:20px;right:20px;background:transparent;border:none;color:var(--text3);font-size:20px;cursor:pointer">✕</button>
  </div>
</div>

<div class="modal-overlay" id="modal-register">
  <div class="modal">
    <div class="modal-header"><div class="modal-title">Join free</div></div>
    <form onsubmit="handleRegister(event)">
      <div class="form-group"><label class="form-label">Name</label><input type="text" id="reg-name" class="form-input" placeholder="Your name"></div>
      <div class="form-group"><label class="form-label">Email</label><input type="email" id="reg-email" class="form-input" placeholder="you@example.com"></div>
      <div class="form-group"><label class="form-label">Password</label><input type="password" id="reg-pass" class="form-input" placeholder="••••••••"></div>
      <button type="submit" class="btn btn-primary btn-full" style="margin-top:8px">Create account</button>
    </form>
    <button onclick="closeModal('register')" style="position:absolute;top:20px;right:20px;background:transparent;border:none;color:var(--text3);font-size:20px;cursor:pointer">✕</button>
  </div>
</div>

<script src="../js/app.js"></script>
<script>
// Show correct state based on login
const origUpdateAuthUI = updateAuthUI;
function updateAuthUI() {
  origUpdateAuthUI();
  if (State.currentUser) {
    document.getElementById('favorites-locked').style.display = 'none';
    document.getElementById('favorites-content').style.display = 'block';
    renderSavedGrid();
  } else {
    document.getElementById('favorites-locked').style.display = 'block';
    document.getElementById('favorites-content').style.display = 'none';
  }
}

function renderSavedGrid() {
  const grid = document.getElementById('saved-grid');
  const saved = TOOLS.filter(t => State.savedTools.has(t.id));
  grid.innerHTML = saved.map(t => `
    <div class="tool-card">
      <div class="tool-card-top">
        <div class="tool-icon">${t.emoji}</div>
        <button class="tool-action-btn saved" onclick="toggleSave(event,${t.id})">♥</button>
      </div>
      <div class="tool-name">${t.name}</div>
      <div class="tool-desc">${t.desc}</div>
      <div class="tool-card-footer">
        <span class="tool-cat-badge">${t.category}</span>
        <a href="${t.url}" target="_blank" class="btn btn-sm btn-outline">Open ↗</a>
      </div>
    </div>
  `).join('');
}

document.addEventListener('DOMContentLoaded', updateAuthUI);
</script>
</body>
</html>
